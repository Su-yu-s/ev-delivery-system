<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="initial-scale=1.0, user-scalable=no, width=device-width">
  <title>用户管理 - 电动汽车物资配送系统</title>
  <link rel="shortcut icon" href="/images/logo.png">
  <link rel="stylesheet" href="/css/theme.css?v=20260118002">
  <link rel="stylesheet" href="/css/common-layout.css?v=20260117001">
  <link rel="stylesheet" href="/css/admin-common.css?v=20260117001">
</head>

<body class="bg-image">

  <!-- 顶部标题栏 -->
  <header class="top-header">
    <div class="header-content">
      <div class="header-left">
        <h1 class="header-title">电动汽车物资配送系统</h1>
      </div>
      <div class="header-right">
        <!-- 未登录状态 -->
        <div id="authNav" class="auth-nav">
          <a href="/html/login.html" class="nav-btn login-btn" id="loginBtn">
            <span>登录</span>
          </a>
          <a href="/html/register.html" class="nav-btn register-btn" id="registerBtn">
            <span>注册</span>
          </a>
        </div>
        
        <!-- 已登录状态 -->
        <div id="profileNav" class="profile-nav">
          <!-- 管理员角色标识 -->
          <span id="adminBadge" class="admin-badge" style="display: none;">
            <span>管理员</span>
          </span>
          <div class="user-info-dropdown">
            <button class="user-info-btn" id="userInfoBtn">
              <span>您好!</span>
              <span class="user-name" id="navUsername">用户</span>
              <span class="dropdown-arrow">▼</span>
            </button>
            <div class="dropdown-menu" id="userDropdown">
              <a href="/html/profile.html" class="dropdown-item">
                <span>个人资料</span>
              </a>
              <div id="adminQuickMenu" style="display: none;">
                <div class="dropdown-divider"></div>
                <a href="/html/admin-dashboard.html" class="dropdown-item admin-dropdown-item">
                  <span>管理控制台</span>
                </a>
              </div>
              <div class="dropdown-divider"></div>
              <button class="dropdown-item logout-item" id="logoutBtn">
                <span>退出登录</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- 左侧导航栏 -->
  <aside class="left-sidebar">
    <nav class="sidebar-nav">
      <a href="/html/index.html" class="nav-item">
        <span class="nav-text">首页</span>
      </a>
      <a href="/html/profile.html" class="nav-item">
        <span class="nav-text">个人中心</span>
      </a>
      <a href="/html/profile.html#security" class="nav-item">
        <span class="nav-text">安全设置</span>
      </a>
      <a href="/html/profile.html#account" class="nav-item">
        <span class="nav-text">账号管理</span>
      </a>
      
      <!-- 管理员菜单（仅管理员可见） -->
      <div id="adminMenuSection" class="admin-menu-section" style="display: none;">
        <div class="nav-divider"></div>
        <div class="nav-section-title">管理员功能</div>
        <a href="/html/admin-users.html" class="nav-item admin-nav">
          <span class="nav-text">用户管理</span>
        </a>
        <a href="/html/admin-tasks.html" class="nav-item admin-nav">
          <span class="nav-text">任务管理</span>
        </a>
        <a href="/html/admin-dashboard.html" class="nav-item admin-nav">
          <span class="nav-text">数据看板</span>
        </a>
      </div>
    </nav>
  </aside>

  <!-- 主内容区域 -->
  <div class="page-wrapper">
    <div class="admin-container">
      
      <!-- 统计卡片区域 -->
      <div class="stats-section">
        <div class="stat-card total">
          <div class="stat-icon">U</div>
          <div class="stat-info">
            <div class="stat-value" id="statTotal">0</div>
            <div class="stat-label">总用户数</div>
          </div>
        </div>
        <div class="stat-card admin">
          <div class="stat-icon">A</div>
          <div class="stat-info">
            <div class="stat-value" id="statAdmin">0</div>
            <div class="stat-label">管理员</div>
          </div>
        </div>
        <div class="stat-card normal">
          <div class="stat-icon">N</div>
          <div class="stat-info">
            <div class="stat-value" id="statNormal">0</div>
            <div class="stat-label">普通用户</div>
          </div>
        </div>
        <div class="stat-card active">
          <div class="stat-icon">O</div>
          <div class="stat-info">
            <div class="stat-value" id="statActive">0</div>
            <div class="stat-label">正常状态</div>
          </div>
        </div>
      </div>

      <!-- 工具栏 -->
      <div class="toolbar-section">
        <div class="toolbar-left">
          <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜索用户名、手机号、姓名...">
            <button class="search-btn" onclick="searchUsers()">搜索</button>
          </div>
          <div class="filter-group">
            <label>角色筛选:</label>
            <select id="roleFilter" onchange="filterUsers()">
              <option value="all">全部</option>
              <option value="ADMIN">管理员</option>
              <option value="USER">普通用户</option>
            </select>
          </div>
        </div>
        <div class="toolbar-right">
          <button class="toolbar-btn refresh" onclick="loadUsers()">刷新</button>
          <button class="toolbar-btn primary" onclick="showAddUserModal()">添加用户</button>
        </div>
      </div>

      <!-- 用户列表区域 -->
      <div class="user-list-section">
        <div class="section-header">
          <h2>用户列表</h2>
          <span class="user-count" id="userCount">共 0 个用户</span>
        </div>
        
        <div class="user-table-wrapper">
          <table class="user-table">
            <thead>
              <tr>
                <th>用户ID</th>
                <th>用户名</th>
                <th>手机号</th>
                <th>姓名</th>
                <th>角色</th>
                <th>状态</th>
                <th>注册时间</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="userTableBody">
            </tbody>
          </table>
        </div>
        
        <div class="empty-state" id="emptyState" style="display: none;">
          <div class="empty-icon">[空]</div>
          <h3>暂无用户数据</h3>
          <p>点击"添加用户"按钮创建第一个用户</p>
        </div>
        
        <div class="loading-state" id="loadingState">
          <div class="loading-spinner"></div>
          <p>正在加载用户数据...</p>
        </div>
        
        <!-- 分页控件 -->
        <div class="pagination-container" id="paginationContainer"></div>
      </div>
      
    </div>
  </div>

  <!-- 用户编辑弹窗 -->
  <div class="modal-overlay" id="userModal" style="display: none;">
    <div class="modal-container">
      <div class="modal-header">
        <h2 id="modalTitle">用户详情</h2>
        <button class="modal-close" onclick="closeUserModal()">&times;</button>
      </div>
      <div class="modal-body" id="modalBody">
      </div>
    </div>
  </div>

  <!-- 重置密码弹窗 -->
  <div class="modal-overlay" id="resetPwdModal" style="display: none;">
    <div class="modal-container modal-sm">
      <div class="modal-header">
        <h2>重置密码</h2>
        <button class="modal-close" onclick="closeResetPwdModal()">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="resetUserId">
        <p id="resetUserInfo" style="margin-bottom: 16px; color: #666;"></p>
        <div class="form-group">
          <label>新密码:</label>
          <input type="password" id="newPassword" placeholder="请输入新密码（至少6位）">
        </div>
        <div class="form-group">
          <label>确认密码:</label>
          <input type="password" id="confirmPassword" placeholder="请再次输入新密码">
        </div>
        <div class="form-actions">
          <button class="btn-secondary" onclick="closeResetPwdModal()">取消</button>
          <button class="btn-primary" onclick="submitResetPassword()">确认重置</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 确认删除弹窗 -->
  <div class="modal-overlay" id="confirmModal" style="display: none;">
    <div class="modal-container modal-sm">
      <div class="modal-header">
        <h2>确认操作</h2>
        <button class="modal-close" onclick="closeConfirmModal()">&times;</button>
      </div>
      <div class="modal-body">
        <p id="confirmMessage">确定要执行此操作吗?</p>
        <input type="hidden" id="confirmUserId">
        <div class="form-actions">
          <button class="btn-secondary" onclick="closeConfirmModal()">取消</button>
          <button class="btn-danger" onclick="executeConfirm()">确认删除</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 消息提示 -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="/js/common-layout.js?v=20260118020"></script>
  <script src="/js/admin-users.js?v=20260118003"></script>
</body>
</html>

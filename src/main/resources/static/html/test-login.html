<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="initial-scale=1.0, user-scalable=no, width=device-width">
  <title>登录测试 - 电动汽车物资配送系统</title>
  <link rel="shortcut icon" href="/images/logo.png">
  <!-- 引入主题系统 -->
  <link rel="stylesheet" href="/css/theme.css">
  <!-- 引入独立CSS文件 -->
  <link rel="stylesheet" href="/css/login.css">
</head>

<body class="bg-image">
  <!-- 登录表单容器 -->
  <div class="login-container fade-in-up animation-delay-0-2s">
    <div class="login-header">
      <h1>登录测试</h1>
      <p>测试登录功能</p>
    </div>
    
    <form id="loginForm">
      <div class="form-group">
        <label for="loginId">手机号</label>
        <input type="text" class="form-input" id="loginId" name="loginId" placeholder="请输入手机号" value="19851663611" required>
        <div class="error-message" id="loginIdError"></div>
      </div>

      <div class="form-group">
        <label for="password">密码</label>
        <input type="password" class="form-input" id="password" name="password" placeholder="请输入密码" value="123456" required>
        <div class="error-message" id="passwordError"></div>
      </div>

      <button type="submit" class="login-btn" id="loginBtn">
        <span id="btnText">测试登录</span>
      </button>
    </form>

    <div id="result" style="margin-top: 20px; padding: 10px; border-radius: 5px;"></div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const loginForm = document.getElementById('loginForm');
      const resultDiv = document.getElementById('result');
      
      loginForm.addEventListener('submit', async function(event) {
        event.preventDefault();
        
        const formData = new FormData(event.target);
        const phone = formData.get('loginId').trim();
        const password = formData.get('password');
        
        try {
          // 显示加载状态
          resultDiv.innerHTML = '<div style="background: #e3f2fd; color: #1976d2; padding: 10px; border-radius: 5px;">正在测试登录...</div>';
          
          // 使用URL编码参数格式发送请求
          const params = new URLSearchParams();
          params.append('phone', phone);
          params.append('password', password);
          
          const response = await fetch('/api/user/login', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/x-www-form-urlencoded',
            },
            body: params
          });
          
          const result = await response.json();
          
          if (result.code === 200) {
            // 登录成功
            resultDiv.innerHTML = `
              <div style="background: #e8f5e9; color: #388e3c; padding: 10px; border-radius: 5px;">
                <h3>登录成功!</h3>
                <p>用户ID: ${result.data.id}</p>
                <p>用户名: ${result.data.username}</p>
                <p>手机号: ${result.data.phone}</p>
                <p>姓名: ${result.data.name}</p>
                <p>状态: ${result.data.status}</p>
              </div>
            `;
          } else {
            // 登录失败
            resultDiv.innerHTML = `
              <div style="background: #ffebee; color: #d32f2f; padding: 10px; border-radius: 5px;">
                <h3>登录失败!</h3>
                <p>错误代码: ${result.code}</p>
                <p>错误信息: ${result.message}</p>
              </div>
            `;
          }
        } catch (error) {
          console.error('登录测试失败:', error);
          resultDiv.innerHTML = `
            <div style="background: #ffebee; color: #d32f2f; padding: 10px; border-radius: 5px;">
              <h3>请求失败!</h3>
              <p>错误信息: ${error.message}</p>
            </div>
          `;
        }
      });
    });
  </script>
</body>
</html>
